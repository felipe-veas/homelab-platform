apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-nodeport
  annotations:
    policies.kyverno.io/title: Disallow NodePort in CEL expressions
    policies.kyverno.io/category: Best Practices in CEL
    policies.kyverno.io/minversion: 1.12.0
    kyverno.io/kubernetes-version: "1.26-1.27"
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Service
    policies.kyverno.io/description: >-
      Services of type NodePort expose host ports directly. This policy blocks
      NodePort services except in argocd (which uses NodePort for UI access)
      and kube-system.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: validate-nodeport
      match:
        any:
        - resources:
            kinds:
            - Service
            operations:
            - CREATE
            - UPDATE
      exclude:
        any:
        - resources:
            namespaces:
            - argocd
            - kube-system
      validate:
        cel:
          expressions:
          - expression: "has(object.spec.type) ? (object.spec.type != 'NodePort') : true"
            message: "Services of type NodePort are not allowed."
