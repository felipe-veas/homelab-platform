apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-requests-limits
  annotations:
    policies.kyverno.io/title: Require Limits and Requests in CEL expressions
    policies.kyverno.io/category: Best Practices, EKS Best Practices in CEL
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.12.0
    kyverno.io/kubernetes-version: "1.26-1.27"
    policies.kyverno.io/description: >-
      All containers must define CPU and memory requests and memory limits to
      ensure predictable scheduling and resource usage on the local cluster.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: validate-resources
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
                - UPDATE
      exclude:
        any:
          - resources:
              namespaces:
                - argocd
                - cert-manager
                - kube-system
                - kyverno
                - monitoring
      validate:
        cel:
          expressions:
            - expression: >-
                object.spec.containers.all(container,
                has(container.resources) &&
                has(container.resources.requests) &&
                has(container.resources.requests.memory) &&
                has(container.resources.requests.cpu) &&
                has(container.resources.limits) &&
                has(container.resources.limits.memory))
              message: "CPU and memory resource requests and limits are required."
